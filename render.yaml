previews:
  generation: off

services:
  - type: web
    runtime: docker
    name: theindiesprototype-web
    plan: starter
    dockerfilePath: infrastructure/docker/web.prod.Dockerfile
    dockerContext: .
    autoDeployTrigger: commit
    healthCheckPath: /ready
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: TIP_API_BASE_URL
        value: https://theindiesprototype-api.onrender.com
      - key: TIP_WS_BASE_URL
        value: wss://theindiesprototype-api.onrender.com
      - key: TIP_API_INTERNAL_HOSTPORT
        fromService:
          type: web
          name: theindiesprototype-api
          property: hostport

  - type: web
    runtime: docker
    name: theindiesprototype-api
    plan: starter
    dockerfilePath: infrastructure/docker/api.prod.Dockerfile
    dockerContext: .
    autoDeployTrigger: commit
    healthCheckPath: /ready
    preDeployCommand: corepack pnpm --filter @tip/api prisma:migrate:deploy
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3001"
      - key: TIP_WEB_ORIGIN
        value: https://theindiesprototype-web.onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: theindiesprototype-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: theindiesprototype-redis
          property: connectionString
      - key: MINIO_HOSTPORT
        fromService:
          type: pserv
          name: theindiesprototype-minio
          property: hostport
      - key: MINIO_REGION
        value: us-east-1
      - key: MINIO_BUCKET
        value: tip-assets
      - key: MINIO_ACCESS_KEY
        fromService:
          type: pserv
          name: theindiesprototype-minio
          envVarKey: MINIO_ROOT_USER
      - key: MINIO_SECRET_KEY
        fromService:
          type: pserv
          name: theindiesprototype-minio
          envVarKey: MINIO_ROOT_PASSWORD
      - key: UPLOAD_MAX_BYTES
        value: "26214400"
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_ACCESS_TTL_SECONDS
        value: "900"
      - key: JWT_REFRESH_TTL_SECONDS
        value: "604800"

  - type: worker
    runtime: docker
    name: theindiesprototype-worker
    plan: starter
    dockerfilePath: infrastructure/docker/worker.prod.Dockerfile
    dockerContext: .
    autoDeployTrigger: commit
    maxShutdownDelaySeconds: 120
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: theindiesprototype-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: theindiesprototype-redis
          property: connectionString
      - key: MINIO_HOSTPORT
        fromService:
          type: pserv
          name: theindiesprototype-minio
          property: hostport
      - key: MINIO_REGION
        value: us-east-1
      - key: MINIO_BUCKET
        value: tip-assets
      - key: MINIO_ACCESS_KEY
        fromService:
          type: pserv
          name: theindiesprototype-minio
          envVarKey: MINIO_ROOT_USER
      - key: MINIO_SECRET_KEY
        fromService:
          type: pserv
          name: theindiesprototype-minio
          envVarKey: MINIO_ROOT_PASSWORD
      - key: WORKER_CONCURRENCY
        value: "2"
      - key: WORKER_HEALTH_PORT
        value: "3002"

  - type: pserv
    runtime: image
    name: theindiesprototype-minio
    plan: starter
    image:
      url: docker.io/minio/minio:latest
    dockerCommand: minio server /data --address "0.0.0.0:10000" --console-address "0.0.0.0:10001"
    disk:
      name: minio-data
      mountPath: /data
      sizeGB: 10
    envVars:
      - key: MINIO_ROOT_USER
        value: tipminio
      - key: MINIO_ROOT_PASSWORD
        generateValue: true
      - key: MINIO_BROWSER
        value: "off"

  - type: keyvalue
    name: theindiesprototype-redis
    plan: starter
    maxmemoryPolicy: noeviction
    ipAllowList: []

databases:
  - name: theindiesprototype-db
    plan: basic-256mb
    region: oregon
    postgresMajorVersion: "16"
    databaseName: tip
    user: tip
    ipAllowList: []
